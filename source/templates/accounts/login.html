{% extends "base.html" %}

{% block content %}
<div class="card-tracker login-card my-4">
    <div class="card-tracker-header text-center">Вход</div>
    <div class="p-4">
        <form id="login-form" method="post" action="">
            {% csrf_token %}
            {% for error in form.non_field_errors %}
                <div class="error-tracker">{{ error }}</div>
            {% endfor %}
            {% for field in form %}
                <div class="mb-3">
                    <label for="{{ field.id_for_label }}" class="label-tracker">
                        {{ field.label }}
                    </label>
                    {{ field }}
                    {% for error in field.errors %}
                        <p class="text-danger small mt-1">{{ error }}</p>
                    {% endfor %}
                </div>
            {% endfor %}
        </form>
    </div>
    <div class="card-tracker-footer text-center">
        <button type="submit" form="login-form" class="btn-tracker">Войти</button>
    </div>
</div>
{% endblock %}
