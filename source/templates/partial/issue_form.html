{% csrf_token %}

{% for error in form.non_field_errors %}
<div class="alert alert-danger py-2">{{ error }}</div>
{% endfor %}

{% for field in form %}
    <div class="mb-3">
        <label for="{{ field.id_for_label }}" class="form-label fw-semibold">
            {{ field.label }}
        </label>
        {{ field }}
        {% for error in field.errors %}
            <p class="text-danger small mt-1">{{ error }}</p>
        {% endfor %}
    </div>
{% endfor %}
