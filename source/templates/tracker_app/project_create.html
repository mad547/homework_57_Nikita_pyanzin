{% extends 'base.html' %}

{% block content %}
<div class="card-tracker my-4" style="max-width: 600px; margin: auto;">
    <div class="card-tracker-header text-center">Новый проект</div>
    <div class="p-4">
        <form id="project-form" action="" method="POST">
            {% include 'partial/project_form.html' %}
        </form>
    </div>
    <div class="card-tracker-footer d-flex justify-content-between">
        <a href="{% url 'project_list' %}" class="btn-tracker-outline">Отмена</a>
        <button type="submit" form="project-form" class="btn-tracker">Создать</button>
    </div>
</div>
{% endblock %}
