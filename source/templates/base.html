{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>Issue Tracker</title>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-tracker bg-dark navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'project_list' %}">🐛 Issue Tracker</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" href="{% url 'project_list' %}">Проекты</a>
            {% if request.user.is_authenticated %}
                <a class="nav-link text-white" href="{% url 'project_create' %}">+ Новый проект</a>
                <span class="nav-link text-white-50">{{ request.user.username }}</span>
                <form method="POST" action="{% url 'accounts:logout' %}" class="d-inline">
                    {% csrf_token %}
                    <button class="nav-link text-white border-0 bg-transpatrent">Выйти</button>
                </form>
            {% else %}
                <a class="nav-link text-white" href="{% url 'accounts:login' %}">Войти</a>
            {% endif %}
        </div>
    </div>
</nav>
<div class="container py-4">
    {% block content %}
    {% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
